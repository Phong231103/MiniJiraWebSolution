services:
 postgres:
  image: postgres:16-alpine
  container_name: MiniJira
  environment:
    - POSTGRES_USER=admin
    - POSTGRES_PASSWORD=admin1234
    - POSTGRES_DB=MiniJira
  restart: always
  volumes:
    - postgres_data_tracker:/var/lib/postgresql/data
  ports:
    - "5435:5432"

volumes:
  postgres_data_tracker:
    driver: local