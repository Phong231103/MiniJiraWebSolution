services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-jira-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin1234
      POSTGRES_DB: MiniJira
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_tracker:/var/lib/postgresql/data
    networks:
      - mini-jira-network

  redis:
    image: redis:7.2-alpine
    container_name: mini-jira-redis
    restart: always
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - yourStrongPassword123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mini-jira-network

volumes:
  postgres_data_tracker:
    driver: local
  redis_data:
    driver: local

networks:
  mini-jira-network:
    driver: bridge